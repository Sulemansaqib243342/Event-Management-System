<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EventSphere</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: url('images/hero_bg.png') no-repeat center center/cover; min-height: 100vh; position: relative; display: flex; align-items: center;">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1;"></div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">
                <div class="text-center mb-4">
                    <a class="navbar-brand fs-1 text-white text-decoration-none" href="index.html">
                        <i class="fa-solid fa-globe"></i> EventSphere
                    </a>
                </div>
                
                <div class="card glass-card border-0 p-4 shadow-lg">
                    <div class="card-body">
                        <h2 class="text-center fw-bold mb-4">Login</h2>
                        
                        <div id="auth-alert" class="alert alert-danger d-none" role="alert"></div>
                        
                        <form id="login-form" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                                    <input type="email" class="form-control border-start-0" id="email" placeholder="name@example.com" required>
                                </div>
                                <div class="invalid-feedback">Please enter a valid email.</div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
                                </div>
                                <div class="invalid-feedback">Please enter your password.</div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label small" for="rememberMe">Remember me</label>
                                </div>
                                <a href="#" class="small text-decoration-none text-primary">Forgot password?</a>
                            </div>
                            
                            <button type="submit" class="btn btn-gradient w-100 py-2 fs-5 shadow-sm" id="login-btn">
                                <span>Sign In</span>
                                <div class="spinner-border spinner-border-sm d-none ms-2" role="status"></div>
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="mb-0">Don't have an account? <a href="signup.html" class="text-primary fw-bold text-decoration-none">Sign Up</a></p>
                        </div>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <a href="index.html" class="text-white-50 text-decoration-none small"><i class="fa-solid fa-arrow-left me-1"></i> Back to Home</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Show loading state
            const btn = document.getElementById('login-btn');
            const spinner = btn.querySelector('.spinner-border');
            const btnText = btn.querySelector('span');
            btn.disabled = true;
            spinner.classList.remove('d-none');
            btnText.innerText = 'Signing In...';
            
            try {
                const success = await auth.login(email, password);
                if (success) {
                    window.location.href = 'index.html';
                } else {
                    const alert = document.getElementById('auth-alert');
                    alert.innerText = 'Invalid email or password';
                    alert.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                const alert = document.getElementById('auth-alert');
                alert.innerText = 'An error occurred. Please try again.';
                alert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
                btnText.innerText = 'Sign In';
            }
        });
    </script>
</body>
</html>
