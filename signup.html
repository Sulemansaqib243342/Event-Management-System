<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EventSphere</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: url('images/hero_bg.png') no-repeat center center/cover; min-height: 100vh; position: relative; display: flex; align-items: center; padding: 50px 0;">
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1;"></div>
    
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <div class="text-center mb-4">
                    <a class="navbar-brand fs-1 text-white text-decoration-none" href="index.html">
                        <i class="fa-solid fa-globe"></i> EventSphere
                    </a>
                </div>
                
                <div class="card glass-card border-0 p-4 shadow-lg">
                    <div class="card-body">
                        <h2 class="text-center fw-bold mb-4">Create Account</h2>
                        
                        <div id="auth-alert" class="alert alert-danger d-none" role="alert"></div>
                        
                        <form id="signup-form" class="needs-validation" novalidate>
                            <div class="row">
                                <div class="col-md-12 mb-3">
                                    <label for="name" class="form-label fw-semibold">Full Name</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-user text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0" id="name" placeholder="John Doe" required>
                                    </div>
                                    <div class="invalid-feedback">Please enter your name.</div>
                                </div>
                                
                                    <div class="invalid-feedback">Please enter a valid email.</div>
                                </div>
                                
                                <div class="col-md-12 mb-3">
                                    <label for="phone" class="form-label fw-semibold">Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-phone text-muted"></i></span>
                                        <input type="tel" class="form-control border-start-0" id="phone" placeholder="+1 (555) 000-0000">
                                    </div>
                                    <small class="text-muted">Optional</small>
                                </div>
                                
                                <div class="col-md-12 mb-3">
                                    <label for="password" class="form-label fw-semibold">Password</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-transparent border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                                        <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" minlength="6" required>
                                    </div>
                                    <div class="invalid-feedback">Password must be at least 6 characters.</div>
                                </div>

                                <div class="col-md-12 mb-4">
                                    <label for="role" class="form-label fw-semibold">Account Type</label>
                                    <select class="form-select" id="role">
                                        <option value="user" selected>Attendee (Standard User)</option>
                                        <option value="admin">Organizer (Admin)</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" id="terms" required>
                                <label class="form-check-label small" for="terms">
                                    I agree to the <a href="#" class="text-primary text-decoration-none">Terms of Service</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a>
                                </label>
                                <div class="invalid-feedback">You must agree to continue.</div>
                            </div>
                            
                            <button type="submit" class="btn btn-gradient w-100 py-2 fs-5 shadow-sm" id="signup-btn">
                                <span>Sign Up</span>
                                <div class="spinner-border spinner-border-sm d-none ms-2" role="status"></div>
                            </button>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="mb-0">Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            if (!form.checkValidity()) {
                e.stopPropagation();
                form.classList.add('was-validated');
                return;
            }
            
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value,
                phone: document.getElementById('phone').value
            };
            
            // Show loading state
            const btn = document.getElementById('signup-btn');
            const spinner = btn.querySelector('.spinner-border');
            const btnText = btn.querySelector('span');
            btn.disabled = true;
            spinner.classList.remove('d-none');
            btnText.innerText = 'Creating Account...';
            
            try {
                const result = await auth.signup(userData);
                if (result.success) {
                    window.location.href = 'index.html';
                } else {
                    const alert = document.getElementById('auth-alert');
                    alert.innerText = result.message || 'Registration failed';
                    alert.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                const alert = document.getElementById('auth-alert');
                alert.innerText = 'An error occurred. Please try again.';
                alert.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
                btnText.innerText = 'Sign Up';
            }
        });
    </script>
</body>
</html>
