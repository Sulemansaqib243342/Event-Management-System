<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources Hub - EventSphere</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        .resource-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .resource-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15) !important;
        }
        .category-pill {
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .category-pill.active {
            background-color: var(--primary-color) !important;
            color: white !important;
        }
    </style>
</head>
<body style="background: url('images/hero_bg.png') no-repeat center center/cover fixed; min-height: 100vh;">
    <div style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: -1;"></div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html">
                <i class="fa-solid fa-globe"></i> EventSphere
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="events.html">Events</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="resources.html">Resources</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="register.html">Event Registration</a>
                    </li>
                    <li class="nav-item ms-lg-3" id="auth-nav-item">
                        <!-- Handled by auth.js -->
                    </li>
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" class="btn btn-outline-secondary rounded-circle">
                            <i class="fa-solid fa-moon"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header Section -->
    <header class="container text-center text-white" style="padding-top: 150px; padding-bottom: 50px;">
        <h1 class="display-3 fw-bold mb-3">Resources Hub</h1>
        <p class="lead opacity-75">Your ultimate toolkit for successful event planning and attendance.</p>
    </header>

    <!-- Content Section -->
    <section class="container mb-5 pb-5">
        <!-- Category Filter -->
        <div class="d-flex justify-content-center flex-wrap gap-2 mb-5" id="category-filters">
            <span class="badge bg-light text-dark rounded-pill px-4 py-2 category-pill active" data-category="all">All Resources</span>
            <span class="badge bg-light text-dark rounded-pill px-4 py-2 category-pill" data-category="planning">Planning Tools</span>
            <span class="badge bg-light text-dark rounded-pill px-4 py-2 category-pill" data-category="guides">Attendee Guides</span>
            <span class="badge bg-light text-dark rounded-pill px-4 py-2 category-pill" data-category="marketing">Marketing</span>
        </div>

        <!-- Resources Grid -->
        <div class="row g-4" id="resources-grid">
            <!-- Resource Cards will be injected here via JS -->
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white py-5 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 EventSphere. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/auth.js"></script>
    <script src="js/script.js"></script>
    <script>
        const resources = [
            {
                title: "Event Planning Checklist",
                category: "planning",
                description: "A comprehensive step-by-step guide to planning your next big event successfully.",
                icon: "fa-list-check",
                fileSize: "1.2 MB",
                type: "PDF"
            },
            {
                title: "Attendee Guide 2026",
                category: "guides",
                description: "Everything you need to know as an attendee to make the most of EventSphere events.",
                icon: "fa-book-open",
                fileSize: "2.5 MB",
                type: "PDF"
            },
            {
                title: "Social Media Templates",
                category: "marketing",
                description: "Ready-to-use graphics to promote your events on Instagram, Twitter, and Facebook.",
                icon: "fa-share-nodes",
                fileSize: "15.0 MB",
                type: "ZIP"
            },
            {
                title: "Budget Spreadsheet",
                category: "planning",
                description: "Manage your event finances with this automated Excel template.",
                icon: "fa-file-excel",
                fileSize: "450 KB",
                type: "XLSX"
            },
            {
                title: "Speaker Onboarding Kit",
                category: "marketing",
                description: "A professional kit to welcome and prepare your event speakers.",
                icon: "fa-microphone",
                fileSize: "3.1 MB",
                type: "PDF"
            },
            {
                title: "Venue Selection Guide",
                category: "planning",
                description: "Tips and tricks for choosing the perfect location for any event type.",
                icon: "fa-building",
                fileSize: "800 KB",
                type: "PDF"
            }
        ];

        function renderResources(category = 'all') {
            const grid = document.getElementById('resources-grid');
            grid.innerHTML = '';

            const filtered = category === 'all' 
                ? resources 
                : resources.filter(r => r.category === category);

            filtered.forEach(res => {
                const card = `
                    <div class="col-lg-4 col-md-6">
                        <div class="card glass-card border-0 h-100 shadow-sm resource-card p-4">
                            <div class="d-flex align-items-center mb-3">
                                <div class="bg-primary bg-opacity-10 text-primary rounded-circle d-flex justify-content-center align-items-center me-3" style="width: 50px; height: 50px;">
                                    <i class="fa-solid ${res.icon} fs-4"></i>
                                </div>
                                <span class="badge bg-secondary bg-opacity-10 text-secondary rounded-pill">${res.category.toUpperCase()}</span>
                            </div>
                            <h4 class="fw-bold mb-2">${res.title}</h4>
                            <p class="text-muted small mb-4">${res.description}</p>
                            <div class="mt-auto d-flex justify-content-between align-items-center">
                                <span class="text-muted small"><i class="fa-solid fa-file-arrow-down me-1"></i> ${res.fileSize} (${res.type})</span>
                                <button class="btn btn-gradient btn-sm px-4 rounded-pill">Download</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderResources();

            // Filter logic
            document.querySelectorAll('.category-pill').forEach(pill => {
                pill.addEventListener('click', () => {
                    document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
                    pill.classList.add('active');
                    renderResources(pill.dataset.category);
                });
            });
        });
    </script>
</body>
</html>
